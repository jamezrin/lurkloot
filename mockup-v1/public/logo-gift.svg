<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Streamaxxer">
  <defs>
    <linearGradient id="gx-bg" x1="14" y1="10" x2="116" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a06bff"/>
      <stop offset="0.52" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#3fbf12"/>
    </linearGradient>
    <linearGradient id="gx-fill" x1="64" y1="34" x2="64" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef0ff"/>
    </linearGradient>
    <filter id="gx-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#190a3a" flood-opacity="0.30"/>
    </filter>

    <!-- Whole gift = white, with the ribbon seam AND a centered play triangle cut out -->
    <mask id="gx-mask">
      <!-- box body -->
      <rect x="33" y="60" width="62" height="40" rx="9" fill="#ffffff"/>
      <!-- lid -->
      <rect x="27" y="46" width="74" height="18" rx="7" fill="#ffffff"/>
      <!-- bow: two symmetric rounded lobes meeting at the center knot -->
      <path fill="#ffffff" d="M64 46 C60 32, 40 30, 41 41 C41.6 47.5, 55 47.5, 64 46 Z"/>
      <path fill="#ffffff" d="M64 46 C68 32, 88 30, 87 41 C86.4 47.5, 73 47.5, 64 46 Z"/>
      <!-- vertical ribbon seam (cut) -->
      <rect x="59.5" y="46" width="9" height="54" fill="#000000"/>
      <!-- play triangle (cut), nudged right of the seam so the seam frames it -->
      <path fill="#000000" d="
        M72 71
        C 72 68.6, 74.6 67.2, 76.7 68.5
        L 88.5 75.6
        C 90.5 76.8, 90.5 79.7, 88.5 80.9
        L 76.7 88.1
        C 74.6 89.4, 72 88, 72 85.6
        Z"/>
    </mask>
  </defs>

  <rect x="4" y="4" width="120" height="120" rx="30" fill="url(#gx-bg)"/>
  <path d="M4 34 C4 17.4 17.4 4 34 4 H94 C110.6 4 124 17.4 124 34 V44 C84 18 44 18 4 44 Z"
        fill="#ffffff" opacity="0.14"/>

  <g filter="url(#gx-shadow)">
    <rect x="0" y="0" width="128" height="128" fill="url(#gx-fill)" mask="url(#gx-mask)"/>
  </g>
</svg>
