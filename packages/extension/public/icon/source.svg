<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Stream Autopilot">
  <defs>
    <linearGradient id="rx-bg" x1="14" y1="10" x2="116" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a06bff"/>
      <stop offset="0.52" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#3fbf12"/>
    </linearGradient>
    <linearGradient id="rx-fill" x1="64" y1="40" x2="64" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef0ff"/>
    </linearGradient>
    <filter id="rx-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#190a3a" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect x="4" y="4" width="120" height="120" rx="30" fill="url(#rx-bg)"/>
  <path d="M4 34 C4 17.4 17.4 4 34 4 H94 C110.6 4 124 17.4 124 34 V44 C84 18 44 18 4 44 Z"
        fill="#ffffff" opacity="0.14"/>

  <g filter="url(#rx-shadow)">
    <!-- track: faint full ring -->
    <circle cx="64" cy="64" r="34" fill="none" stroke="#ffffff" stroke-opacity="0.28" stroke-width="9"/>
    <!-- progress arc: ~72% sweep, starting at top, rounded caps -->
    <path
      d="M64 30 A34 34 0 1 1 36.2 83.9"
      fill="none" stroke="url(#rx-fill)" stroke-width="9" stroke-linecap="round"/>
    <!-- play triangle in the center -->
    <path fill="url(#rx-fill)" d="
      M55 50
      C 55 47.2, 58.1 45.6, 60.4 47.1
      L 81 60.9
      C 83.1 62.3, 83.1 65.7, 81 67.1
      L 60.4 80.9
      C 58.1 82.4, 55 80.8, 55 78
      Z"/>
  </g>
</svg>
