name: Deploy site

# Build the Astro landing site and deploy it to the production Cloudflare Pages
# project (lurkloot) on push to main. Path-filtered so unrelated changes don't
# redeploy; workflow_dispatch allows manual redeploys.

on:
  push:
    branches: [main]
    paths:
      - 'packages/site/**'
      - 'packages/shared/**'
      - 'packages/popup-ui/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/site-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build:site

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/site
          command: pages deploy dist --project-name=lurkloot --branch=main
